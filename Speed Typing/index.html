<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Typing Speed Test</title>
<style>
  * { box-sizing: border-box; }
  body {
    font-family: Arial, sans-serif;
    margin: 0;
    background-color: #f0f4f8;
    display: flex;
    justify-content: center;
    align-items: flex-start;
    min-height: 100vh;
    padding: 20px;
  }
  .container {
    background: white;
    width: 100%;
    max-width: 800px;
    padding: 25px;
    margin: 20px;
    border-radius: 12px;
    box-shadow: 0 0 15px rgba(0,0,0,0.1);
    text-align: center;
  }
  h1 { font-size: 1.8rem; }
  h2 { margin: 10px 0; text-align: left; }
  #sentence-list { font-size: 1rem; min-height: 60px; line-height: 1.5; word-wrap: break-word; }
  #input-box {
    width: 100%;
    min-height: 80px;
    font-size: 1rem;
    padding: 10px;
    margin-bottom: 15px;
    resize: vertical;
    text-align: center;
  }
  .stats {
    display: flex;
    flex-wrap: wrap;
    justify-content: center;
    font-size: 1rem;
    margin-bottom: 15px;
    gap: 10px;
  }

  /* BLUE BUTTONS ONLY */
  button {
    padding: 10px 20px;
    font-size: 1rem;
    cursor: pointer;
    margin: 5px;
    background-color: #007BFF; /* Blue button */
    color: white;
    border: none;
    border-radius: 5px;
    transition: background 0.3s;
  }
  button:hover {
    background-color: #0056b3; /* Darker blue on hover */
  }

  /* TIMER TEXT DEFAULT COLOR */
  #timer {
    color: black; /* Timer text stays normal black */
  }

  select {
    padding: 10px 20px;
    font-size: 1rem;
    cursor: pointer;
    margin: 5px;
  }

  .correct { color: green; }
  .incorrect { color: red; }
  #typing-container, #results-container { display: none; }

  @media (max-width: 600px) {
    .stats { flex-direction: column; gap: 5px; }
    #input-box { min-height: 60px; }
  }
</style>
</head>
<body>

<!-- START PAGE -->
<div class="container" id="start-container">
  <h1>Typing Speed Test</h1>
  <p>Select the test duration:</p>
  <select id="time-select">
    <option value="30">30 Seconds</option>
    <option value="60" selected>1 Minute</option>
    <option value="120">2 Minutes</option>
    <option value="300">5 Minutes</option>
  </select>
  <br>
  <button id="start-btn">Start Test</button>
</div>

<!-- TYPING PAGE -->
<div class="container" id="typing-container">
  <h1>Typing Speed Test</h1>
  <div style="margin-bottom:15px; text-align:left;">
    <h2>Sentence:</h2>
    <p id="sentence-list"></p>
  </div>
  <textarea id="input-box" placeholder="Start typing..."></textarea>
  <div class="stats">
    <div>Time: <span id="timer">60</span>s</div>
    <div>WPM: <span id="wpm">0</span></div>
    <div>Accuracy: <span id="accuracy">0</span>%</div>
    <div>Sentences Correct: <span id="sentences-correct">0</span></div>
  </div>
  <button id="restart-btn">Restart</button>
</div>

<!-- RESULTS PAGE -->
<div class="container" id="results-container">
  <h1>Time's Up!</h1>
  <p>Total Sentences Typed Correctly: <span id="final-sentences">0</span></p>
  <p>Final WPM: <span id="final-wpm">0</span></p>
  <p>Accuracy: <span id="final-accuracy">0</span>%</p>
  <p id="motivational-message" style="font-weight:bold; margin-top:10px;"></p>
  <button id="retry-btn">Try Again</button>
</div>

<script>
const sentences = [
  "The quick brown fox jumps over the lazy dog.",
  "Typing tests improve speed and accuracy.",
  "Practice makes perfect for fast typing.",
  "JavaScript can manipulate the DOM easily.",
  "Always keep your hands on the home row.",
  "A fast typer is also a careful reader.",
  "Speed comes with consistent practice.",
  "Errors should be corrected immediately.",
  "Time flies when you are typing fast.",
  "Learning new words helps typing skills.",
  "Focus on accuracy before increasing speed.",
  "Short sentences are easier to complete quickly.",
  "Typing regularly strengthens your finger memory.",
  "Challenge yourself with complex sentences daily.",
  "Avoid looking at the keyboard while typing.",
  "Every mistake teaches you to type better.",
  "Fast typing requires both speed and concentration.",
  "Use proper posture to avoid hand strain.",
  "Breaks help maintain typing efficiency for long periods.",
  "Observe which letters slow you down the most.",
  "A consistent rhythm improves typing performance.",
  "Keyboard shortcuts save time while typing.",
  "Typing games can make learning fun and effective.",
  "Proofreading is essential even for fast typists.",
  "Reading regularly increases your vocabulary for typing.",
  "Typing with correct fingers reduces mistakes.",
  "Concentrate on difficult words to type faster.",
  "Accuracy is more important than raw speed.",
  "Learning touch typing is highly recommended.",
  "Use ergonomic keyboards to prevent strain injuries.",
  "Typing speed improves with proper warm-up exercises.",
  "Take breaks to maintain focus during long tests.",
  "Reading aloud can help memorize new words.",
  "Avoid distractions to improve your typing performance.",
  "Consistency beats occasional intense practice.",
  "Learn common words to type them faster.",
  "Typing while listening to music can improve rhythm.",
  "Mastering punctuation increases overall accuracy.",
  "Typing every day improves finger memory.",
  "Avoid looking down at the keyboard frequently.",
  "Track your progress to measure improvement.",
  "Use online typing tests to monitor your speed.",
  "Learn to type without errors first, then increase speed.",
  "Typing competitions can motivate learning.",
  "Keep your wrists straight to prevent strain.",
  "Correct posture ensures better typing performance.",
  "Typing fast also requires mental alertness.",
  "Try to maintain a steady rhythm while typing.",
  "Challenge yourself with longer paragraphs.",
  "Switch hands for certain keys to type efficiently.",
  "Typing practice builds confidence over time."
];

const startContainer = document.getElementById('start-container');
const typingContainer = document.getElementById('typing-container');
const resultsContainer = document.getElementById('results-container');
const startBtn = document.getElementById('start-btn');
const timeSelect = document.getElementById('time-select');

const inputBox = document.getElementById('input-box');
const timerDisplay = document.getElementById('timer');
const wpmDisplay = document.getElementById('wpm');
const accuracyDisplay = document.getElementById('accuracy');
const sentencesCorrectDisplay = document.getElementById('sentences-correct');

const sentenceList = document.getElementById('sentence-list');
const finalSentences = document.getElementById('final-sentences');
const finalWPM = document.getElementById('final-wpm');
const finalAccuracy = document.getElementById('final-accuracy');
const motivationalMessage = document.getElementById('motivational-message');
const retryBtn = document.getElementById('retry-btn');
const restartBtn = document.getElementById('restart-btn');

let TOTAL_TIME = 60;
let time = TOTAL_TIME;
let timer;
let started = false;
let currentSentence = "";
let totalTypedChars = 0;
let correctChars = 0;
let sentencesCorrect = 0;
let currentSentenceIndex = 1;

function getRandomSentence() {
  return sentences[Math.floor(Math.random() * sentences.length)];
}

function displaySentence(sentence) {
  sentenceList.innerHTML = "";
  for (let char of sentence) {
    const span = document.createElement('span');
    span.innerText = char;
    sentenceList.appendChild(span);
  }
}

function updateHighlight() {
  const spans = sentenceList.querySelectorAll('span');
  const input = inputBox.value;
  correctChars = 0;
  spans.forEach((span, i) => {
    if (!input[i]) span.className = "";
    else if (input[i] === span.innerText) { span.className = "correct"; correctChars++; }
    else span.className = "incorrect";
  });
}

function calculateStats() {
  const wordsTyped = inputBox.value.trim().split(/\s+/).length;
  const minutesPassed = (TOTAL_TIME - time) / 60;
  const liveWPM = minutesPassed > 0 ? Math.round(wordsTyped / minutesPassed) : 0;
  wpmDisplay.innerText = liveWPM;
  const accuracy = totalTypedChars > 0 ? Math.round((correctChars / totalTypedChars) * 100) : 0;
  accuracyDisplay.innerText = accuracy;
}

function nextSentence() {
  totalTypedChars += currentSentence.length;
  inputBox.value = "";
  currentSentence = getRandomSentence();
  displaySentence(currentSentence);
  currentSentenceIndex++;
}

function startTimer() {
  timer = setInterval(() => {
    time--;
    timerDisplay.innerText = time;
    if (time <= 0) {
      clearInterval(timer);
      inputBox.disabled = true;
      showResults();
    }
  }, 1000);
}

function startTest() {
  TOTAL_TIME = parseInt(timeSelect.value);
  time = TOTAL_TIME;
  timerDisplay.innerText = time;
  startContainer.style.display = 'none';
  typingContainer.style.display = 'block';
  resetTest();
}

function resetTest() {
  inputBox.value = "";
  inputBox.disabled = false;
  wpmDisplay.innerText = 0;
  accuracyDisplay.innerText = 0;
  sentencesCorrectDisplay.innerText = 0;
  totalTypedChars = 0;
  correctChars = 0;
  sentencesCorrect = 0;
  currentSentenceIndex = 1;
  started = false;
  nextSentence();
}

function showResults() {
  typingContainer.style.display = 'none';
  resultsContainer.style.display = 'block';
  finalSentences.innerText = sentencesCorrect;
  finalWPM.innerText = wpmDisplay.innerText;
  finalAccuracy.innerText = accuracyDisplay.innerText;
  const acc = parseInt(accuracyDisplay.innerText);
  
  if (acc < 50) motivationalMessage.innerText = "Don't give up! Keep practicing and you'll improve! 💪✨";
  else if (acc < 70) motivationalMessage.innerText = "Good job! A bit more practice and you'll be a typing master! 👍🔥";
  else if (acc > 90) motivationalMessage.innerText = "Excellent! You're a typing ninja! Try the challenge with 5 min next time! 🥷🏆";
  else motivationalMessage.innerText = "Well done! Keep pushing to reach 90%+ accuracy! 🎉🚀";
}

startBtn.addEventListener('click', startTest);
restartBtn.addEventListener('click', resetTest);
retryBtn.addEventListener('click', () => {
  resultsContainer.style.display = 'none';
  startContainer.style.display = 'block';
});

inputBox.addEventListener('input', () => {
  if (!started) { started = true; startTimer(); }
  updateHighlight();
  calculateStats();
  if (inputBox.value === currentSentence) {
    sentencesCorrect++;
    sentencesCorrectDisplay.innerText = sentencesCorrect;
    nextSentence();
  }
});

nextSentence();
</script>
</body>
</html>
